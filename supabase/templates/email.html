<!DOCTYPE html>
<html>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #faf8f5; padding: 40px 20px; color: #1a1a1a;">
    <div style="max-width: 480px; margin: 0 auto; background: #ffffff; padding: 40px; border-radius: 12px; border: 1px solid #eee;">
      <h1 style="font-size: 22px; margin: 0 0 12px;">Your Navi verification code</h1>
      <p style="font-size: 15px; color: #555; margin: 0 0 24px;">
        Enter this 6-digit code in the Navi chat to confirm your email.
      </p>
      <div style="font-size: 36px; font-weight: 700; letter-spacing: 8px; text-align: center; padding: 20px; background: #f5f1ea; border-radius: 8px; font-family: 'SF Mono', Menlo, monospace;">
        {{ .Token }}
      </div>
      <p style="font-size: 13px; color: #888; margin: 24px 0 0;">
        This code expires in 60 minutes. If you didn't request it, you can ignore this email.
      </p>
    </div>
  </body>
</html>
